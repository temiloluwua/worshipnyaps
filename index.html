<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Let CSS env(safe-area-inset-*) actually resolve on iOS + iPad. Without
         viewport-fit=cover the WKWebView renders in a smaller safe frame and
         the app looks zoomed / cropped. maximum-scale=1 prevents iOS from
         zooming in when a form field is focused. -->
    <title>Worship N Yaps - Calgary Bible Study Community</title>
    <meta name="description" content="Join Bible studies and community events across Calgary. Swipe through discussion cards, find local events, and connect with fellow believers." />
    <meta name="keywords" content="bible study, calgary, community, faith, worship, discussion, volunteer, christian, fellowship" />
    <meta name="author" content="Worship N Yaps Team" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.worshipnyaps.com/" />
    <meta property="og:title" content="Worship N Yaps - Calgary Bible Study Community" />
    <meta property="og:description" content="Join Bible studies and community events across Calgary. Swipe through discussion cards, find local events, and connect with fellow believers." />
    <meta property="og:image" content="https://www.worshipnyaps.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://www.worshipnyaps.com/" />
    <meta property="twitter:title" content="Worship N Yaps - Calgary Bible Study Community" />
    <meta property="twitter:description" content="Join Bible studies and community events across Calgary. Swipe through discussion cards, find local events, and connect with fellow believers." />
    <meta property="twitter:image" content="https://www.worshipnyaps.com/og-image.jpg" />
    <!-- Third-party auth widgets — always loaded async/defer so a slow CDN
         can never block first paint. App Store review flagged blank-screen
         on iPad; a blocking third-party script is a common cause. -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <!-- Last-resort visible fallback. If the module bundle fails to execute
         (e.g. a WKWebView refuses the entry script under the capacitor://
         scheme), the app would otherwise show a pure-white screen with no
         way to recover. This inline script runs even if the bundle never
         does, so review/users get a message + reload instead of a blank page. -->
    <script>
      window.setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.childElementCount === 0) {
          root.innerHTML =
            '<div style="min-height:100vh;display:flex;flex-direction:column;' +
            'align-items:center;justify-content:center;gap:16px;padding:24px;' +
            'font-family:system-ui,-apple-system,sans-serif;text-align:center;color:#111">' +
            '<div style="font-size:18px;font-weight:600">Worship N Yaps couldn\'t finish loading</div>' +
            '<div style="font-size:14px;color:#666;max-width:320px">Please check your connection and try again.</div>' +
            '<button onclick="window.location.reload()" style="padding:12px 24px;' +
            'background:#2650eb;color:#fff;border:none;border-radius:10px;font-size:16px;' +
            'font-weight:600">Reload</button></div>';
        }
      }, 8000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
